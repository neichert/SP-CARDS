<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte interactive - Pompiers</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="map"></div>

<div id="top-bar">
  <div id="search-box">
    <input type="text" id="search-input" placeholder="Rechercher une rue, une adresse...">
    <div id="search-results"></div>
  </div>

  <select id="map-select" title="Changer de carte"></select>

  <div id="toolbar"></div>

  <button id="cancel-mode-btn" title="Annuler le mode actif">✖ Annuler</button>

  <button id="config-toggle" title="Configuration">⚙️</button>
  <button id="lock-toggle" title="Verrouiller / déverrouiller l'édition">🔒</button>
  <button id="sidebar-toggle">☰ Liste</button>
</div>

<div id="sidebar">
  <h2>Éléments ajoutés</h2>
  <div id="item-list"></div>
  <div id="sidebar-actions">
    <button id="export-btn">Exporter (JSON)</button>
    <button id="import-btn">Importer</button>
    <input type="file" id="import-file" accept="application/json" style="display:none">
    <button id="change-password-btn">Changer le mot de passe</button>
    <button id="clear-btn" class="danger">Tout effacer</button>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Ajouter un élément</h3>
    <label for="modal-label">Nom / Note (optionnel)</label>
    <input type="text" id="modal-label" placeholder="Ex: Borne devant le 12 rue de la Paix">
    <div id="modal-actions">
      <button id="modal-cancel">Annuler</button>
      <button id="modal-save">Enregistrer</button>
    </div>
  </div>
</div>

<div id="password-modal-overlay">
  <div id="password-modal">
    <h3 id="password-modal-title">Authentification requise</h3>
    <p id="password-modal-text">Saisissez le mot de passe pour modifier la carte.</p>
    <input type="password" id="password-input" placeholder="Mot de passe" autocomplete="off">
    <div id="password-modal-actions">
      <button id="password-cancel">Annuler</button>
      <button id="password-confirm">Valider</button>
    </div>
  </div>
</div>

<div id="config-modal-overlay">
  <div id="config-modal">
    <div id="config-header">
      <h3>Configuration</h3>
      <button id="config-close">✖</button>
    </div>
    <div id="config-tabs">
      <button class="config-tab active" data-tab="types">Types de points</button>
      <button class="config-tab" data-tab="zones">Cartes / Zones</button>
    </div>
    <div id="config-tab-types">
      <div id="type-list"></div>
      <button id="add-type-btn">➕ Ajouter un type</button>
    </div>
    <div id="config-tab-zones" style="display:none;">
      <div id="zone-list"></div>
      <button id="add-zone-btn">➕ Créer une carte (zone)</button>
    </div>
  </div>
</div>

<div id="status-bar"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="security.js"></script>
<script src="script.js"></script>
<script src="config.js"></script>
<script src="sync.js"></script>
</body>
</html>
